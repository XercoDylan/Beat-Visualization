<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Frequency</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07060５;
  --bg:#070605;
  --surf:#100f0c;
  --text:#eee8d4;
  --dim:#8a8370;
  --faint:#2a2820;
  --gold:#d4a017;
  --gold2:#f0c030;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
}

/* ══ HORIZONTAL SCROLL WRAPPER ══ */
#stage{
  display:flex;flex-direction:row;
  height:100vh;width:max-content;
  will-change:transform;
  user-select:none;
}

/* ══ LANDING PANEL ══ */
#landing{
  width:100vw;height:100vh;flex-shrink:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 10vw;position:relative;overflow:hidden;
  border-right:1px solid var(--faint);
}
#lcanvas{position:absolute;inset:0;pointer-events:none}
.l-kicker{font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.38em;color:var(--gold);text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fadeup .7s .4s ease forwards}
.l-h1{font-family:'Syne',sans-serif;font-size:clamp(60px,11vw,140px);font-weight:800;line-height:.88;letter-spacing:-.04em;opacity:0;animation:fadeup .8s .6s ease forwards}
.l-h1 em{color:var(--gold);font-style:normal;display:block}
.l-sub{margin-top:28px;font-size:clamp(14px,1.4vw,17px);color:var(--dim);max-width:480px;line-height:1.72;opacity:0;animation:fadeup .8s .8s ease forwards}
.l-cue{
  position:absolute;right:48px;top:50%;transform:translateY(-50%);
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.25em;
  color:var(--faint);text-transform:uppercase;writing-mode:vertical-rl;
  display:flex;align-items:center;gap:10px;opacity:0;
  animation:fadeup .7s 1.2s ease forwards;cursor:pointer
}
.l-cue::after{content:'→';writing-mode:horizontal-tb;color:var(--gold);font-size:14px;animation:nudge 1.8s ease-in-out infinite}

/* ══ ERA PANEL ══ */
.epanel{
  width:90vw;height:100vh;flex-shrink:0;
  display:grid;
  grid-template-rows:1fr 80px 1fr;
  grid-template-columns:1fr 1fr;
  position:relative;
  border-right:1px solid var(--faint);
}
/* column spans */
.ep-scene{grid-row:1;grid-column:1;position:relative;overflow:hidden}
.ep-info{grid-row:1;grid-column:2;padding:40px 48px 24px 40px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.ep-spine{grid-row:2;grid-column:1/3;position:relative;display:flex;align-items:center}
.ep-story{grid-row:3;grid-column:1;padding:24px 32px 40px 48px;overflow:hidden}
.ep-web{grid-row:3;grid-column:2;position:relative;overflow:hidden}

/* scene canvas */
.ep-scene canvas{width:100%;height:100%;display:block}
.ep-scene-label{
  position:absolute;bottom:12px;left:16px;
  font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:.28em;
  color:rgba(255,255,255,.18);text-transform:uppercase
}

/* spine row */
.ep-spine-line{
  position:absolute;left:0;right:0;top:50%;
  height:2px;background:linear-gradient(90deg,var(--faint),var(--faint));
  transform:translateY(-50%)
}
.ep-node-wrap{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;z-index:10;
  cursor:pointer
}
.ep-node{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--nc);background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),background .3s,box-shadow .3s;
  position:relative;
}
.ep-node:hover,.epanel.lit .ep-node{
  transform:scale(1.5);
  background:var(--nc);
  box-shadow:0 0 0 10px color-mix(in srgb,var(--nc) 15%,transparent),
             0 0 40px color-mix(in srgb,var(--nc) 25%,transparent);
}
.ep-node-dot{
  width:12px;height:12px;border-radius:50%;background:var(--nc);
  transition:background .3s;
}
.ep-node:hover .ep-node-dot,.epanel.lit .ep-node .ep-node-dot{background:var(--bg)}
.ep-ring{
  position:absolute;width:76px;height:76px;border-radius:50%;
  border:1px solid var(--nc);opacity:0;
}
.epanel.lit .ep-ring{animation:ripple 1.8s ease-out infinite}
.epanel.lit .ep-ring:nth-child(2){animation-delay:.7s}
.ep-year{
  position:absolute;left:calc(50% + 44px);
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.18em;
  color:var(--dim);white-space:nowrap;
  transition:color .3s
}
.epanel.lit .ep-year{color:var(--nc)}

/* info (top right) */
.ep-tag{font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:.32em;text-transform:uppercase;margin-bottom:8px;transition:opacity .3s;opacity:.5}
.epanel.lit .ep-tag{opacity:1}
.ep-name{font-family:'Syne',sans-serif;font-size:clamp(22px,2.8vw,38px);font-weight:800;letter-spacing:-.025em;line-height:1.05;margin-bottom:10px}
.ep-hook{font-size:13px;color:var(--dim);line-height:1.6;max-width:320px}
.ep-quote{
  margin-top:20px;padding-left:18px;
  border-left:2px solid var(--nc);
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  line-height:1.35;letter-spacing:-.01em;
  overflow:hidden;max-height:0;
  transition:max-height .6s .2s ease,opacity .5s .2s;
  opacity:0
}
.epanel.lit .ep-quote{max-height:120px;opacity:1}
.ep-qattr{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:.22em;color:var(--gold);margin-top:6px}
.qchar{opacity:0;transform:translateY(5px);display:inline-block;transition:opacity .3s,transform .3s}
.epanel.lit .qchar{opacity:1;transform:none}

/* story (bottom left) */
.ep-story-txt{font-size:13px;color:var(--dim);line-height:1.76;max-width:420px}
.ep-story-txt strong{color:var(--text);font-weight:500}
.ep-story-txt p+p{margin-top:10px}
.ep-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
.ep-pill{font-family:'Syne Mono',monospace;font-size:7px;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--faint);color:var(--dim);padding:3px 7px}

/* web (bottom right) */
.ep-web canvas{width:100%;height:100%;display:block}

/* wave bar — across the bottom of the scene */
.ep-wave{
  position:absolute;bottom:0;left:0;right:0;height:48px;
  cursor:pointer;
}

/* ══ CONNECTOR between panels ══ */
.connector{
  width:60px;height:100vh;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.conn-line{
  position:absolute;top:50%;left:0;right:0;height:2px;
  background:var(--faint);transform:translateY(-50%);
}
.conn-arrow{font-size:12px;color:var(--faint);position:relative;z-index:2}

/* ══ PROGRESS BAR ══ */
#progress{
  position:fixed;bottom:0;left:0;right:0;height:2px;
  background:var(--faint);z-index:100
}
#progress-fill{height:100%;background:var(--gold);width:0%;transition:width .1s}

/* ══ NAV DOTS ══ */
#nav{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:100
}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--faint);cursor:pointer;transition:all .25s
}
.nav-dot.active{background:var(--gold);transform:scale(1.5)}

/* ══ SCROLL HINT ══ */
#scroll-hint{
  position:fixed;right:32px;bottom:32px;z-index:100;
  font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:.25em;
  color:var(--faint);text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  transition:opacity .5s
}
#scroll-hint span{color:var(--gold);animation:nudge 1.6s ease-in-out infinite;font-size:14px}

/* ══ KEYFRAMES ══ */
@keyframes fadeup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(7px)}}
@keyframes ripple{0%{transform:scale(.6);opacity:.5}100%{transform:scale(2);opacity:0}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
</style>
</head>
<body>

<div id="stage">

  <!-- LANDING -->
  <div id="landing">
    <canvas id="lcanvas"></canvas>
    <p class="l-kicker">African Diaspora · Music · Memory · Resistance</p>
    <h1 class="l-h1">The<em>Frequency</em></h1>
    <p class="l-sub">From the South Bronx to Lagos — five decades of music as survival, identity, and reclamation. Scroll right to travel through time.</p>
    <span class="l-cue" onclick="scrollTo(1)">Begin the journey</span>
  </div>

</div>

<!-- PROGRESS + NAV -->
<div id="progress"><div id="progress-fill"></div></div>
<div id="nav"></div>
<div id="scroll-hint">Scroll or drag <span>→</span></div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const ERAS = [
  {
    color:"#d4a017", year:"1973–1979", tag:"Genesis",
    name:"The South\nBronx Breaks",
    hook:"A city abandons a borough.\nA borough invents a culture.",
    story:["On <strong>August 11, 1973</strong>, DJ Kool Herc isolated the break of funk records on two turntables at 1520 Sedgwick Ave, creating an endless percussive loop. That night, Hip-Hop was born.",
           "The South Bronx had lost 600,000 jobs since 1970. Landlords burned buildings for insurance. From this rubble: <strong>DJing, MCing, B-Boying, Graffiti</strong> — a complete culture of survival."],
    quote:"You are now about to witness the strength of street knowledge.",
    qattr:"— Grandmaster Flash & The Furious Five",
    pills:["Breakbeats","Block Party","B-Boying","Turntablism","South Bronx"],
    samples:[{l:"Amen Brother\nWinstons 1969",x:.15,y:.3},{l:"Funky Drummer\nJ. Brown 1970",x:.4,y:.15},{l:"Apache\nIncredibles 1973",x:.65,y:.25},{l:"Give It Up\nMeters 1969",x:.84,y:.45},{l:"The Breaks\nKurtis Blow 1980",x:.5,y:.78}],
    edges:[[0,4],[1,4],[2,3],[1,2],[3,4]],
    scene:"bronx"
  },
  {
    color:"#c05020", year:"1979–1986", tag:"The Word Spreads",
    name:"Old School\nto Radio",
    hook:"Rapper Delight crosses to AM.\nThe culture goes national.",
    story:["<strong>Rapper Delight (1979)</strong> brought rap to mainstream radio. By the mid-80s, Run-DMC and LL Cool J pushed the genre from block parties to arenas.",
           "Run-DMC's collaboration with Aerosmith cracked open genre fusion. The tension between artistic origin and commercial control is a thread running through all of Black music history."],
    quote:"It is like that, and that is the way it is.",
    qattr:"— Run-DMC, 1983",
    pills:["Electrofunk","12-inch Singles","Radio Rap","Crossover","Adidas"],
    samples:[{l:"Good Times\nChic 1979",x:.12,y:.28},{l:"Rapper Delight\nSugarhill 1979",x:.36,y:.16},{l:"The Message\nFlash 1982",x:.62,y:.22},{l:"Walk This Way\nRun-DMC 1986",x:.84,y:.46},{l:"Rock Box\nRun-DMC 1984",x:.5,y:.76}],
    edges:[[0,1],[1,2],[2,4],[3,4],[1,4]],
    scene:"radio"
  },
  {
    color:"#1a7a5e", year:"1987–1993", tag:"The Golden Age",
    name:"Consciousness\n& Coast Wars",
    hook:"Public Enemy brings the noise.\nDe La Soul brings the flowers.",
    story:["<strong>Public Enemy</strong> made political noise. <strong>N.W.A</strong> gave voice to West Coast reality. <strong>De La Soul and A Tribe Called Quest</strong> connected rap to jazz and Afrocentrism.",
           "The <strong>Akai MPC and SP-1200</strong> became Hip-Hop's primary tools. Sampling became identity built from inheritance — a living argument between past and present."],
    quote:"Don't believe the hype.",
    qattr:"— Public Enemy, 1988",
    pills:["Jazz Rap","Gangsta","Afrocentrism","SP-1200","Native Tongues","MPC"],
    samples:[{l:"Impeach The Pres\nHoney Drippers",x:.13,y:.26},{l:"Straight Outta\nCompton 1988",x:.38,y:.14},{l:"Fight The Power\nP.E. 1989",x:.64,y:.22},{l:"Bonita Applebum\nATCQ 1990",x:.84,y:.5},{l:"Me Myself and I\nDe La Soul 1989",x:.5,y:.76}],
    edges:[[0,2],[1,2],[0,4],[2,3],[3,4]],
    scene:"golden"
  },
  {
    color:"#7040b0", year:"1994–2003", tag:"The Peak",
    name:"Illmatic to\nThe Blueprint",
    hook:"Nine tracks. No filler.\nThe standard is set forever.",
    story:["In <strong>1994</strong>, Nas released Illmatic — nine tracks of New York storytelling over jazz samples used as architecture. That same year, Biggie released Ready to Die.",
           "The deaths of <strong>Tupac (1996)</strong> and <strong>Biggie (1997)</strong> came from real tensions amplified by media and industry. Hip-Hop grieved, and in grieving, matured."],
    quote:"I never sleep, cause sleep is the cousin of death.",
    qattr:"— Nas, Illmatic 1994",
    pills:["Hardcore NY","G-Funk","Wu-Tang","Roc-A-Fella","Def Jam"],
    samples:[{l:"N.Y. State of Mind\nNas 1994",x:.16,y:.22},{l:"Juicy\nBiggie 1994",x:.4,y:.14},{l:"California Love\nTupac 1995",x:.64,y:.22},{l:"Hard Knock Life\nJay-Z 1998",x:.82,y:.54},{l:"Takeover\nJay-Z 2001",x:.5,y:.76}],
    edges:[[0,1],[1,2],[2,3],[3,4],[0,4]],
    scene:"peak"
  },
  {
    color:"#c03828", year:"2004–2013", tag:"Digital Shift",
    name:"808s &\nThe Internet",
    hook:"Kanye cries through Auto-Tune.\nMixtapes kill the gatekeepers.",
    story:["<strong>College Dropout (2004)</strong> opened Hip-Hop to vulnerability. <strong>808s and Heartbreak (2008)</strong> rewired what rap could sound like emotionally.",
           "<strong>Lil Wayne's mixtape dominance</strong> and blog culture atomized the industry overnight. Trap music — born in Atlanta — began its rise. The gatekeeper was dead."],
    quote:"I am living in the future so the present is my past.",
    qattr:"— Kanye West, 2007",
    pills:["Trap","Auto-Tune","Mixtapes","808s","Blog Era","Hypebeast"],
    samples:[{l:"College Dropout\nKanye 2004",x:.14,y:.28},{l:"Tha Carter III\nLil Wayne 2008",x:.4,y:.16},{l:"808s and HB\nKanye 2008",x:.64,y:.22},{l:"So Far Gone\nDrake 2009",x:.84,y:.5},{l:"T.R.U. REALigion\nGucci 2007",x:.5,y:.76}],
    edges:[[0,2],[1,3],[2,3],[0,4],[3,4]],
    scene:"digital"
  },
  {
    color:"#1a8aaa", year:"2014–Now", tag:"Global Diaspora",
    name:"Afrobeats &\nThe Return",
    hook:"The loop closes.\nAfrica reclaims the frequency.",
    story:["<strong>To Pimp a Butterfly (2015)</strong> fused jazz, funk, and spoken word into a meditation on Blackness in America — and won the Pulitzer Prize for Music.",
           "<strong>Burna Boy, Wizkid, Davido</strong> made Afrobeats a global phenomenon. The diaspora's music traveled from Africa to America and back, completing a circuit that was always already whole."],
    quote:"I am all of us.",
    qattr:"— Burna Boy",
    pills:["Afrobeats","UK Drill","Trap Soul","Amapiano","Pulitzer"],
    samples:[{l:"TPAB\nKendrick 2015",x:.15,y:.24},{l:"Views\nDrake 2016",x:.4,y:.14},{l:"African Giant\nBurna Boy 2019",x:.65,y:.22},{l:"Essence\nWizkid 2020",x:.84,y:.5},{l:"DAMN.\nKendrick 2017",x:.5,y:.76}],
    edges:[[0,4],[1,2],[2,3],[3,4],[0,2]],
    scene:"global"
  }
];

// ══════════════════════════════════════════════
// BUILD ERA PANELS
// ══════════════════════════════════════════════
const stage = document.getElementById('stage');

ERAS.forEach((era, i) => {
  // connector
  const conn = document.createElement('div');
  conn.className = 'connector';
  conn.innerHTML = `<div class="conn-line"></div><span class="conn-arrow">›</span>`;
  stage.appendChild(conn);

  const panel = document.createElement('div');
  panel.className = 'epanel';
  panel.id = 'ep' + i;
  panel.style.setProperty('--nc', era.color);

  const nameHTML = era.name.split('\n').join('<br>');
  const hookHTML = era.hook.split('\n').join('<br>');

  panel.innerHTML = `
    <div class="ep-scene">
      <canvas id="sc${i}"></canvas>
      <canvas class="ep-wave" id="wv${i}"></canvas>
      <span class="ep-scene-label">${era.tag} · ${era.year}</span>
    </div>
    <div class="ep-info">
      <div class="ep-tag" style="color:${era.color}">${era.tag}</div>
      <h2 class="ep-name">${nameHTML}</h2>
      <p class="ep-hook">${hookHTML}</p>
      <div class="ep-quote" id="eq${i}">
        <span id="eqt${i}"></span>
        <p class="ep-qattr">${era.qattr}</p>
      </div>
    </div>
    <div class="ep-spine">
      <div class="ep-spine-line"></div>
      <div class="ep-node-wrap" onclick="lightPanel(${i})">
        <div class="ep-node">
          <div class="ep-ring"></div>
          <div class="ep-ring"></div>
          <div class="ep-node-dot"></div>
        </div>
      </div>
      <div class="ep-year">${era.year}</div>
    </div>
    <div class="ep-story">
      <div class="ep-story-txt">${era.story.map(p=>`<p>${p}</p>`).join('')}</div>
      <div class="ep-pills">${era.pills.map(p=>`<span class="ep-pill">${p}</span>`).join('')}</div>
    </div>
    <div class="ep-web">
      <canvas id="sw${i}"></canvas>
    </div>
  `;

  stage.appendChild(panel);
});

// nav dots
const nav = document.getElementById('nav');
// landing dot
const ld = document.createElement('div');
ld.className = 'nav-dot active'; ld.id = 'nd-1';
ld.onclick = () => scrollTo(-1);
nav.appendChild(ld);
ERAS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot'; d.id = 'nd' + i;
  d.onclick = () => scrollTo(i);
  nav.appendChild(d);
});

// ══════════════════════════════════════════════
// HORIZONTAL SCROLL
// ══════════════════════════════════════════════
let currentX = 0;
let targetX = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartScroll = 0;
let velocity = 0;
let lastX = 0;
let animFrame;
const LERP = 0.1;

function maxScroll() {
  return stage.scrollWidth - window.innerWidth;
}

function scrollTo(eraIdx) {
  if (eraIdx === -1) {
    targetX = 0;
  } else {
    const panel = document.getElementById('ep' + eraIdx);
    if (panel) targetX = Math.min(panel.offsetLeft - window.innerWidth * 0.05, maxScroll());
  }
}

function updateScroll() {
  currentX += (targetX - currentX) * LERP;
  if (Math.abs(targetX - currentX) < 0.5) currentX = targetX;
  stage.style.transform = `translateX(${-currentX}px)`;

  // progress bar
  const prog = currentX / maxScroll();
  document.getElementById('progress-fill').style.width = (prog * 100) + '%';

  // active nav dot
  const pw = window.innerWidth * 0.9 + 60; // panel width + connector
  const panelIdx = Math.round((currentX - window.innerWidth + pw * 0.5) / pw);
  document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
  if (panelIdx < 0) {
    document.getElementById('nd-1').classList.add('active');
  } else {
    const nd = document.getElementById('nd' + Math.min(panelIdx, ERAS.length - 1));
    if (nd) nd.classList.add('active');
  }

  // auto-light visible panels
  ERAS.forEach((_, i) => {
    const panel = document.getElementById('ep' + i);
    if (!panel) return;
    const left = panel.offsetLeft - currentX;
    const visible = left > -window.innerWidth * 0.3 && left < window.innerWidth * 0.7;
    if (visible && !panel.classList.contains('lit')) lightPanel(i);
  });

  animFrame = requestAnimationFrame(updateScroll);
}
updateScroll();

// wheel
window.addEventListener('wheel', e => {
  e.preventDefault();
  targetX = Math.max(0, Math.min(maxScroll(), targetX + e.deltaY + e.deltaX));
}, { passive: false });

// drag
window.addEventListener('mousedown', e => {
  isDragging = true; dragStartX = e.clientX; dragStartScroll = targetX; lastX = e.clientX;
  stage.style.transition = 'none';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  velocity = lastX - e.clientX; lastX = e.clientX;
  targetX = Math.max(0, Math.min(maxScroll(), dragStartScroll + dragStartX - e.clientX));
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  targetX = Math.max(0, Math.min(maxScroll(), targetX + velocity * 8));
});

// touch
window.addEventListener('touchstart', e => { dragStartX = e.touches[0].clientX; dragStartScroll = targetX; lastX = dragStartX; });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  velocity = lastX - e.touches[0].clientX; lastX = e.touches[0].clientX;
  targetX = Math.max(0, Math.min(maxScroll(), dragStartScroll + dragStartX - e.touches[0].clientX));
}, { passive: false });
window.addEventListener('touchend', () => { targetX = Math.max(0, Math.min(maxScroll(), targetX + velocity * 6)); });

// keyboard
window.addEventListener('keydown', e => {
  const step = window.innerWidth * 0.88;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') targetX = Math.min(maxScroll(), targetX + step);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') targetX = Math.max(0, targetX - step);
});

// hide hint after first scroll
let hinted = false;
window.addEventListener('wheel', () => {
  if (!hinted) { document.getElementById('scroll-hint').style.opacity = '0'; hinted = true; }
}, { once: true });

// ══════════════════════════════════════════════
// PANEL LIGHTING
// ══════════════════════════════════════════════
const lit = new Set();
function lightPanel(i) {
  const panel = document.getElementById('ep' + i);
  if (!panel) return;
  panel.classList.add('lit');
  if (lit.has(i)) return;
  lit.add(i);
  animQuote(i);
  initScene(i);
  initWave(i);
  initWeb(i);
}

// ══════════════════════════════════════════════
// QUOTE ANIMATION
// ══════════════════════════════════════════════
function animQuote(i) {
  const era = ERAS[i];
  const el = document.getElementById('eqt' + i);
  if (!el) return;
  el.innerHTML = '';
  let d = 0;
  for (const ch of era.quote) {
    const sp = document.createElement('span');
    sp.className = 'qchar'; sp.textContent = ch;
    sp.style.transitionDelay = d + 'ms';
    el.appendChild(sp);
    d += ch === ' ' ? 15 : 26;
  }
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function h2r(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

// ══════════════════════════════════════════════
// SCENE ANIMATIONS
// ══════════════════════════════════════════════
const scAF = {};
function initScene(i) {
  const c = document.getElementById('sc' + i);
  if (!c) return;
  const wrap = c.parentElement;
  c.width = wrap.offsetWidth || 600;
  c.height = wrap.offsetHeight - 48 || 300;
  const era = ERAS[i];
  const [r,g,b] = h2r(era.color);
  let t = 0;
  const fns = {bronx:bronxScene,radio:radioScene,golden:goldenScene,peak:peakScene,digital:digitalScene,global:globalScene};
  const fn = fns[era.scene];
  function tick() {
    scAF[i] = requestAnimationFrame(tick);
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#07060４'; ctx.fillStyle = '#070604';
    ctx.fillRect(0, 0, c.width, c.height);
    fn(ctx, c.width, c.height, r, g, b, t);
    t++;
  }
  tick();
}

function bronxScene(ctx, W, H, r, g, b, t) {
  // night sky
  ctx.fillStyle = '#060810'; ctx.fillRect(0, 0, W, H * .6);
  // stars
  for (let s = 0; s < 60; s++) {
    const sx = (s * 137 + 3) % W, sy = (s * 97) % (H * .52);
    const a = .15 + Math.abs(Math.sin(t * .025 + s * .4)) * .5;
    ctx.fillStyle = `rgba(255,252,200,${a})`;
    ctx.beginPath(); ctx.arc(sx, sy, .6 + Math.sin(s) * .3, 0, 6.28); ctx.fill();
  }
  // buildings
  [[0,.52,70],[80,.60,58],[138,.48,88],[226,.62,54],[280,.50,78],[358,.56,64],[422,.52,84],[506,.60,72],[578,.52,68],[646,.58,58],[704,.50,88],[792,.54,W-792]].forEach(([x,yf,w]) => {
    const y = H * yf;
    ctx.fillStyle = '#0c0a07'; ctx.fillRect(x, y, w, H - y);
    for (let wy = y + 8; wy < H - 5; wy += 16)
      for (let wx = x + 5; wx < x + w - 5; wx += 12)
        if ((wx + wy + t) % 7 < 3) {
          ctx.fillStyle = `rgba(${r},${g},${b},${.07 + Math.sin(t*.02+wx*.08+wy*.04)*.06})`;
          ctx.fillRect(wx, wy, 5, 8);
        }
  });
  ctx.fillStyle = '#0f0d09'; ctx.fillRect(0, H * .87, W, H * .13);
  // turntable
  const tx = W * .5, ty = H * .75;
  ctx.strokeStyle = `rgba(${r},${g},${b},.55)`; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(tx, ty, 40, 0, 6.28); ctx.stroke();
  ctx.beginPath(); ctx.arc(tx, ty, 16, 0, 6.28); ctx.stroke();
  for (let gr = 20; gr < 38; gr += 5) { ctx.globalAlpha = .18; ctx.beginPath(); ctx.arc(tx, ty, gr, 0, 6.28); ctx.stroke(); ctx.globalAlpha = 1; }
  ctx.save(); ctx.translate(tx, ty); ctx.rotate(-0.4 + Math.sin(t * .015) * .08);
  ctx.strokeStyle = `rgba(${r},${g},${b},.9)`; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(34, -7); ctx.stroke();
  ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(34, -7, 3, 0, 6.28); ctx.fill();
  ctx.restore();
  ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(tx, ty, 5, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#070604'; ctx.beginPath(); ctx.arc(tx, ty, 2, 0, 6.28); ctx.fill();
  const gl = ctx.createRadialGradient(tx, ty, 6, tx, ty, 80);
  gl.addColorStop(0, `rgba(${r},${g},${b},.16)`); gl.addColorStop(1, 'transparent');
  ctx.fillStyle = gl; ctx.fillRect(0, 0, W, H);
}

function radioScene(ctx, W, H, r, g, b, t) {
  const bars = Math.floor(W / 6);
  for (let i = 0; i < bars; i++) {
    const h = 10 + Math.abs(Math.sin(i * .22 + t * .07)) * 50 + Math.abs(Math.sin(i * .09 + t * .04)) * 25;
    ctx.fillStyle = `rgba(${r},${g},${b},${.38 + Math.abs(Math.sin(i * .22 + t * .07)) * .58})`;
    ctx.fillRect(i * 6 + 1, H / 2 - h / 2, 4, h);
  }
  for (let wi = 1; wi <= 6; wi++) {
    const rad = wi * 38 + Math.sin(t * .04) * 4;
    const a = (.6 - wi * .08) * Math.abs(Math.sin(t * .03 + wi * .4)) * .45 + .04;
    ctx.strokeStyle = `rgba(${r},${g},${b},${a})`; ctx.lineWidth = .8;
    ctx.beginPath(); ctx.arc(W / 2, H / 2, rad, Math.PI * 1.2, Math.PI * 1.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(W / 2, H / 2, rad, Math.PI * .2, Math.PI * .8); ctx.stroke();
  }
  const vx = W / 2, vy = H / 2;
  ctx.save(); ctx.translate(vx, vy); ctx.rotate(t * .022);
  for (let vr = 10; vr < 44; vr += 5) { ctx.strokeStyle = `rgba(${r},${g},${b},.14)`; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, vr, 0, 6.28); ctx.stroke(); }
  ctx.restore();
  ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(vx, vy, 6, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#070604'; ctx.beginPath(); ctx.arc(vx, vy, 2.5, 0, 6.28); ctx.fill();
}

function goldenScene(ctx, W, H, r, g, b, t) {
  ctx.strokeStyle = `rgba(${r},${g},${b},.04)`; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  const px = W / 2 - 88, py = H / 2 - 62;
  ctx.fillStyle = '#0d1210'; ctx.fillRect(px - 14, py - 14, 204, 164);
  ctx.strokeStyle = `rgba(${r},${g},${b},.5)`; ctx.lineWidth = 1; ctx.strokeRect(px - 14, py - 14, 204, 164);
  ctx.fillStyle = `rgba(${r},${g},${b},.7)`; ctx.font = 'bold 9px "Syne Mono",monospace'; ctx.textAlign = 'center';
  ctx.fillText('AKAI MPC-60', W / 2, py);
  const pc = ['#c05020','#1a7a5e','#7040b0','#d4a017','#c03828','#1a8aaa','#803020','#206050'];
  for (let row = 0; row < 2; row++) for (let col = 0; col < 4; col++) {
    const bx = px + col * 44, by = py + 16 + row * 54;
    const on = Math.sin(t * .08 + (row * 4 + col) * .7) > .4;
    ctx.fillStyle = pc[row * 4 + col] + (on ? 'dd' : '44'); ctx.fillRect(bx, by, 36, 40);
    if (on) { const pg = ctx.createRadialGradient(bx+18,by+20,3,bx+18,by+20,18); pg.addColorStop(0,pc[row*4+col]+'88'); pg.addColorStop(1,'transparent'); ctx.fillStyle=pg; ctx.fillRect(bx-8,by-8,52,56); }
    ctx.strokeStyle = '#070604'; ctx.lineWidth = 1.5; ctx.strokeRect(bx, by, 36, 40);
  }
  const gl = ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,170); gl.addColorStop(0,`rgba(${r},${g},${b},.1)`); gl.addColorStop(1,'transparent');
  ctx.fillStyle = gl; ctx.fillRect(0, 0, W, H);
}

function peakScene(ctx, W, H, r, g, b, t) {
  ctx.fillStyle = '#0a0610'; ctx.fillRect(0, 0, W, H);
  [[0,.38,54],[54,.48,44],[98,.32,78],[176,.42,48],[224,.35,72],[296,.40,52],[348,.28,92],[440,.42,48],[488,.36,68],[556,.44,52],[608,.33,72],[680,.40,W-680]].forEach(([x,yf,w]) => {
    const y = H * yf;
    ctx.fillStyle = '#0e0a12'; ctx.fillRect(x, y, w, H - y);
    for (let wy = y + 7; wy < H - 4; wy += 14)
      for (let wx = x + 4; wx < x + w - 4; wx += 10)
        if ((wx * 3 + wy * 7 + t) % 11 < 4) { ctx.fillStyle = `rgba(${r},${g},${b},${.05 + Math.sin(t*.015+wx*.08+wy*.04)*.05})`; ctx.fillRect(wx, wy, 4, 7); }
  });
  ctx.fillStyle = '#0c0910'; ctx.fillRect(0, H * .88, W, H * .12);
}

function digitalScene(ctx, W, H, r, g, b, t) {
  if (t % 8 === 0) {
    ctx.fillStyle = 'rgba(7,6,4,.88)'; ctx.fillRect(0, 0, W, H * .9);
    const wds = ['808','TRAP','LEAN','MIXTAPE','BLOG','AUTO-TUNE','FREE DL','WAYNE','KANYE','DRAKE','DATPIFF','MYSPACE','LOSSLESS'];
    ctx.font = '9px "Syne Mono",monospace'; ctx.textAlign = 'left';
    for (let n = 0; n < 45; n++) { ctx.fillStyle = `rgba(${r},${g},${b},${.04+Math.random()*.26})`; ctx.fillText(wds[Math.floor(Math.random()*wds.length)], Math.random()*W, Math.random()*(H*.86)+12); }
  }
  const bx = W/2-84, by = H*.1;
  ctx.fillStyle = '#0d0b08'; ctx.fillRect(bx, by, 168, H*.62);
  ctx.strokeStyle = `rgba(${r},${g},${b},.5)`; ctx.lineWidth = 1; ctx.strokeRect(bx, by, 168, H*.62);
  ctx.fillStyle = `rgba(${r},${g},${b},.7)`; ctx.font = '9px "Syne Mono",monospace'; ctx.textAlign = 'center';
  ctx.fillText('ROLAND TR-808', W/2, by+16);
  ['BD','SD','LT','MT','HT','RS','HC','HH'].forEach((p, pi) => {
    const px2 = bx+8+(pi%4)*40, py2 = by+24+(Math.floor(pi/4)*50), on = Math.sin(t*.12+(pi*.9)) > .55;
    ctx.fillStyle = `rgba(${r},${g},${b},${on?.52:.16})`; ctx.fillRect(px2, py2, 32, 38);
    if (on) { const pg=ctx.createRadialGradient(px2+16,py2+19,3,px2+16,py2+19,16); pg.addColorStop(0,`rgba(${r},${g},${b},.48)`); pg.addColorStop(1,'transparent'); ctx.fillStyle=pg; ctx.fillRect(px2-4,py2-4,40,46); }
    ctx.fillStyle = `rgba(${r},${g},${b},${on?.88:.45})`; ctx.font = '7px "Syne Mono",monospace'; ctx.textAlign = 'center'; ctx.fillText(p, px2+16, py2+23);
    ctx.strokeStyle = '#070604'; ctx.lineWidth = 1; ctx.strokeRect(px2, py2, 32, 38);
  });
}

function globalScene(ctx, W, H, r, g, b, t) {
  const cx = W/2, cy = H/2-6, rad = H*.36;
  ctx.strokeStyle = `rgba(${r},${g},${b},.08)`; ctx.lineWidth = .7;
  for (let lat = -80; lat <= 80; lat += 20) { const ry=Math.cos(lat*Math.PI/180)*rad,yy=cy+Math.sin(lat*Math.PI/180)*rad; ctx.beginPath(); ctx.ellipse(cx,yy,ry,ry*.28,0,0,6.28); ctx.stroke(); }
  for (let lon = 0; lon < 170; lon += 20) { ctx.beginPath(); ctx.ellipse(cx,cy,Math.sin(lon*Math.PI/180)*rad*.25+1,rad,0,0,6.28); ctx.stroke(); }
  ctx.strokeStyle = `rgba(${r},${g},${b},.45)`; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 6.28); ctx.stroke();
  const pts = [{label:'Bronx NY',x:cx-58,y:cy+24},{label:'Kingston',x:cx-26,y:cy+50},{label:'Lagos',x:cx+52,y:cy+8},{label:'Accra',x:cx+38,y:cy+34},{label:'London',x:cx-8,y:cy-38},{label:'Paris',x:cx+16,y:cy-34}];
  const pulse = Math.abs(Math.sin(t * .04));
  pts.forEach((p, pi) => {
    const p2 = pts[(pi+2)%pts.length];
    const gr = ctx.createLinearGradient(p.x,p.y,p2.x,p2.y); gr.addColorStop(0,`rgba(${r},${g},${b},.55)`); gr.addColorStop(1,`rgba(${r},${g},${b},.1)`);
    ctx.strokeStyle = gr; ctx.lineWidth = 1+pulse*.5; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,6.28); ctx.fill();
    ctx.fillStyle = `rgba(${r},${g},${b},.6)`; ctx.font = '7px "Syne Mono",monospace'; ctx.textAlign = 'center'; ctx.fillText(p.label, p.x, p.y+12);
  });
}

// ══════════════════════════════════════════════
// WAVEFORM
// ══════════════════════════════════════════════
const waveState = {};
function initWave(i) {
  const c = document.getElementById('wv' + i);
  if (!c) return;
  c.width = c.parentElement.offsetWidth || 600;
  c.height = 48;
  const [r,g,b] = h2r(ERAS[i].color);
  waveState[i] = { r, g, b, phase: 0, pulse: 0 };
  c.addEventListener('click', () => { waveState[i].pulse = 1; });
  let t = 0;
  (function tick() {
    requestAnimationFrame(tick);
    const s = waveState[i];
    s.phase += .05;
    if (s.pulse > 0) { s.phase += .06; s.pulse = Math.max(0, s.pulse - .018); }
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(7,6,4,.7)'; ctx.fillRect(0, 0, c.width, 48);
    const bars = Math.floor(c.width / 5);
    for (let b = 0; b < bars; b++) {
      const h = 4 + Math.abs(Math.sin(b * .19 + s.phase)) * 18 + Math.abs(Math.sin(b * .08 + s.phase * .5)) * 10 + s.pulse * Math.abs(Math.sin(b * .3)) * 16;
      ctx.fillStyle = `rgba(${s.r},${s.g},${s.b},${.3 + Math.abs(Math.sin(b * .19 + s.phase)) * .65})`;
      ctx.fillRect(b * 5 + 1, 24 - h / 2, 3, h);
    }
    t++;
  })();
}

// ══════════════════════════════════════════════
// SAMPLE WEB
// ══════════════════════════════════════════════
function initWeb(i) {
  const c = document.getElementById('sw' + i);
  if (!c) return;
  c.width = c.parentElement.offsetWidth || 400;
  c.height = c.parentElement.offsetHeight || 300;
  const era = ERAS[i];
  const [r,g,b] = h2r(era.color);
  const W = c.width, H = c.height;
  const nodes = era.samples.map(s => ({ ...s, px: s.x * W, py: s.y * H }));
  let t = 0;
  (function tick() {
    requestAnimationFrame(tick);
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#070604'; ctx.fillRect(0, 0, W, H);
    // edges
    era.edges.forEach(([a, b2]) => {
      const n1 = nodes[a], n2 = nodes[b2];
      const gr = ctx.createLinearGradient(n1.px,n1.py,n2.px,n2.py);
      gr.addColorStop(0, `rgba(${r},${g},${b},.5)`); gr.addColorStop(1, `rgba(${r},${g},${b},.1)`);
      ctx.strokeStyle = gr; ctx.lineWidth = 1.2; ctx.setLineDash([3, 6]);
      ctx.beginPath(); ctx.moveTo(n1.px, n1.py); ctx.lineTo(n2.px, n2.py); ctx.stroke();
      ctx.setLineDash([]);
      // traveling dot
      const prog = (t * .006 + a * .3) % 1;
      ctx.fillStyle = `rgba(${r},${g},${b},.85)`;
      ctx.beginPath(); ctx.arc(n1.px+(n2.px-n1.px)*prog, n1.py+(n2.py-n1.py)*prog, 2, 0, 6.28); ctx.fill();
    });
    // nodes
    nodes.forEach((n, ni) => {
      const pulse = Math.abs(Math.sin(t * .04 + ni * .8));
      ctx.strokeStyle = `rgba(${r},${g},${b},${pulse * .2 + .04})`; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(n.px, n.py, 14 + pulse * 5, 0, 6.28); ctx.stroke();
      const gd = ctx.createRadialGradient(n.px,n.py,4,n.px,n.py,22);
      gd.addColorStop(0, `rgba(${r},${g},${b},.2)`); gd.addColorStop(1, 'transparent');
      ctx.fillStyle = gd; ctx.beginPath(); ctx.arc(n.px, n.py, 22, 0, 6.28); ctx.fill();
      ctx.fillStyle = `rgba(${r},${g},${b},.14)`; ctx.strokeStyle = `rgb(${r},${g},${b})`; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(n.px, n.py, 12, 0, 6.28); ctx.fill(); ctx.stroke();
      ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(n.px, n.py, 3.2, 0, 6.28); ctx.fill();
      const lines = n.l.split('\n');
      ctx.fillStyle = `rgba(${r},${g},${b},.9)`; ctx.font = '500 9px "DM Sans",sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(lines[0], n.px, n.py + 22);
      ctx.fillStyle = `rgba(${r},${g},${b},.45)`; ctx.font = '7px "Syne Mono",monospace';
      if (lines[1]) ctx.fillText(lines[1], n.px, n.py + 32);
    });
    t++;
  })();
}

// ══════════════════════════════════════════════
// LANDING PARTICLES
// ══════════════════════════════════════════════
(function() {
  const c = document.getElementById('lcanvas');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  const pts = Array.from({length:100}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    vx: (Math.random()-.5)*.18, vy: (Math.random()-.5)*.18,
    r: Math.random()*1.4+.3
  }));
  let ft = 0;
  (function tick() {
    requestAnimationFrame(tick);
    ctx.fillStyle = 'rgba(7,6,4,.05)'; ctx.fillRect(0,0,c.width,c.height);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = c.width; if (p.x > c.width) p.x = 0;
      if (p.y < 0) p.y = c.height; if (p.y > c.height) p.y = 0;
      ctx.fillStyle = `rgba(212,160,23,${.1+Math.abs(Math.sin(ft*.024+p.x*.008))*.38})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill();
    });
    for (let i = 0; i < pts.length; i++) for (let j = i+1; j < pts.length; j++) {
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if (d < 82) { ctx.strokeStyle=`rgba(212,160,23,${(.3-d/260)*.22})`; ctx.lineWidth=.4; ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
    }
    ft++;
  })();
})();
